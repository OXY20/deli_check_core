<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deli Check Web</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    margin: 0;
    padding: 40px;
    background-color: #ffffff;
    color: #333;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  
  .main-container {
    width: 100%;
    max-width: 600px;
  }
  
  .upload-container {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 30px;
  }
  
  .file-path-input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid #ccc;
    border-radius: 4px;
    background-color: #f5f5f5;
    color: #666;
    font-size: 14px;
    cursor: not-allowed;
  }
  
  .file-input {
    display: none;
  }
  
  .upload-btn {
    padding: 8px 20px;
    background-color: #f0f0f0;
    border: 1px solid #ccc;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    color: #333;
  }
  
  .upload-btn:hover {
    background-color: #e0e0e0;
  }
  
  .read-btn {
    padding: 8px 20px;
    background-color: #28a745;
    border: 1px solid #28a745;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    color: #fff;
  }
  
  .read-btn:hover {
    background-color: #218838;
    border-color: #1e7e34;
  }
</style>
</head>
<body>
  <div class="main-container">
    <h1>Deli Check Web</h1>
    
    <div class="upload-container">
      <input type="text" class="file-path-input" id="filePath" placeholder="请选择文件..." readonly>
      <input type="file" class="file-input" id="fileInput" accept=".xls,.xlsx">
      <button class="upload-btn" onclick="document.getElementById('fileInput').click()">选择文件</button>
      <button class="read-btn" id="readBtn">读取</button>
    </div>
  </div>
  
  <script>
    document.getElementById('fileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        document.getElementById('filePath').value = file.name;
      }
    });
  </script>
</body>
</html>
